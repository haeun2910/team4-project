<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Schedule - MoveSmart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="edit-schedule-container">
    <h2>Edit Schedule</h2>
    <form id="editScheduleForm">
        <input type="hidden" id="scheduleId">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required>
        </div>
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
            <label for="time">Time</label>
            <input type="time" id="time" name="time" required>
        </div>
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" required>
        </div>
        <button type="button" class="btn-edit-schedule" onclick="handleEditSchedule()">Save Changes</button>
    </form>
    <div id="message" style="color: red; margin-top: 15px;"></div>
</div>
<script src="edit-schedule.js"></script>
</body>
</html>
