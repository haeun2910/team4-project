<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MoveSmart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="register-container">
    <h2>Register - MoveSmart</h2>
    <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" minlength="3" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" minlength="6" required>
        </div>
        <button type="submit" class="btn-register">Register</button>
    </form>
    <div class="social-login">
        <p>Or register with:</p>
        <button class="btn-social" onclick="handleSocialLogin('google')" aria-label="Register with Google">
            <img src="images/google-logo.png" alt="Google" class="social-logo"> Google
        </button>
        <button class="btn-social" onclick="handleSocialLogin('naver')" aria-label="Register with Naver">
            <img src="images/naver-logo.png" alt="Naver" class="social-logo"> Naver
        </button>
        <button class="btn-social" onclick="handleSocialLogin('facebook')" aria-label="Register with Facebook">
            <img src="images/facebook-logo.png" alt="Facebook" class="social-logo"> Facebook
        </button>
    </div>
    <div id="message" style="color: red; margin-top: 15px;"></div>
    <div id="loading" style="display: none; color: green; margin-top: 15px;">Loading...</div>
</div>
<script src="register.js"></script>
</body>
</html>
